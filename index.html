    <style>
      /* Reset & Base */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f8fafc; color: #0f172a; }

      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* Animations */
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes scaleUp { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      @keyframes toastIn { from { opacity: 0; transform: translateX(20px) scale(0.95); } to { opacity: 1; transform: translateX(0) scale(1); } }

      .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
      .animate-scaleUp { animation: scaleUp 0.3s ease-out forwards; }
      .animate-pulse { animation: pulse 2s ease-in-out infinite; }
      .toast-in { animation: toastIn 0.3s ease-out forwards; }

      /* Glass Nav */
      .nav-glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.7); }
      .nav-dot { animation: pulse 2s ease-in-out infinite; }

      /* Glow Card */
      .glow-card { transition: box-shadow 0.25s ease, transform 0.2s ease; }
      .glow-card:hover { box-shadow: 0 8px 30px rgba(99, 102, 241, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04); }

      /* Button Shine */
      .btn-shine { position: relative; overflow: hidden; }
      .btn-shine::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent); transform: rotate(45deg) translateX(-100%); transition: transform 0.6s ease; }
      .btn-shine:hover::after { transform: rotate(45deg) translateX(100%); }

      /* Background Mesh */
      .bg-mesh { background: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 50%, rgba(139, 92, 246, 0.06) 0%, transparent 60%), #f1f5f9; }

      /* Stat Pulse */
      .stat-pulse .stat-value { display: inline-block; transition: transform 0.2s; }
      .stat-pulse:hover .stat-value { transform: scale(1.05); }

      /* Responsive tweaks */
      @media (max-width: 640px) {
        .toast-container { max-width: 90%; right: 5%; }
      }
